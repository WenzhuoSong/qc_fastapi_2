id: equal_weight_benchmark
type: strategy
category: benchmark
horizon: diagnostic_reference
summary: Equal-weight benchmark across the eligible ETF research universe.
best_regimes: [benchmarking, broad_participation]
weak_regimes: [narrow_leadership, high_dispersion, risk_off]
required_features: []
optional_features: [daily_return_pct]
positive_signals:
  - broad participation reference
  - diversification comparison point
failure_modes:
  - ignores trend, valuation, volatility, and news
  - can dilute leadership in narrow markets
  - can include weak assets solely because they are in universe
governance_implications:
  - diagnostic benchmark only
  - use as advisory/reference evidence, not alpha conviction
  - never promote to trade authority without separate approval
