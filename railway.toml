[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# W&B tracking (optional — set in Railway environment variables):
#   WANDB_API_KEY=<your-wandb-api-key>
#   WANDB_PROJECT=agentix
#   WANDB_ENTITY=<your-username>
#   DVC_S3_BUCKET=<bucket> (optional, for data versioning exports)
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION (for DVC S3)
