[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# MLflow tracking (optional — set in Railway environment variables):
#   MLFLOW_TRACKING_URI=http://mlflow-server:5000
#     (references the mlflow-server Railway service via internal DNS)
#   MLFLOW_EXPERIMENT_NAME=agentix
#   DVC_S3_BUCKET=<bucket> (optional, for data versioning exports)
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION (for DVC S3)
