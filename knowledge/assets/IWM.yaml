id: IWM
type: asset
asset_class: equity_etf
role: core_market
sector_group: cyclicals
summary: US small-cap equity ETF with higher economic sensitivity than large-cap benchmarks.
underlying: Russell 2000 Index
leverage: 1
inverse: false
decay_risk: low
allowed_actions: [increase, reduce, hold, watch, neutral]
max_reasonable_weight:
