id: momentum_lite_v1
type: strategy
category: momentum
summary: Medium-horizon momentum strategy that favors ETFs with persistent relative strength.
best_regimes: [trending_bull, risk_on]
weak_regimes: [mean_reverting, high_vol]
required_features: [mom_20d, mom_60d, mom_252d, atr_pct]
positive_signals:
  - broad market trend confirmation
  - multiple horizons aligned
  - volatility not elevated
failure_modes:
  - sharp reversal after crowded momentum
  - high turnover in choppy markets
  - live defensive consensus conflict
governance_implications:
  - cap adds when ATR is elevated
  - advisory only when live consensus conflicts with regime
  - use staged trim rather than full exit without hard risk
compatibility_mappings:
  - role: core_market
    horizon: medium_tactical
    score_thresholds:
      - gte: 0.70
        action: increase
        signal_type: broad_market_momentum
      - gte: 0.40
        action: watch
        signal_type: broad_market_momentum_monitor
      - lt: 0.40
        action: neutral
        signal_type: no_momentum_signal
    max_weight_multiplier: 0.70
    weight_formula: confidence_cap_multiplier
    branch_label_template: "{regime}_momentum_lite_core"

  - role: sector_theme
    horizon: medium_tactical
    score_thresholds:
      - gte: 0.70
        action: increase
        signal_type: sector_theme_momentum
      - gte: 0.40
        action: watch
        signal_type: sector_theme_momentum_monitor
      - lt: 0.40
        action: neutral
        signal_type: no_sector_theme_momentum_signal
    max_weight_multiplier: 0.50
    weight_formula: confidence_cap_multiplier
    branch_label_template: "{regime}_momentum_lite_sector_theme"

  - role: defensive_cash_proxy
    horizon: defensive_tactical
    score_thresholds:
      - gte: 0.70
        action: de_risk
        signal_type: defensive_momentum_fallback
      - gte: 0.40
        action: watch
        signal_type: defensive_momentum_monitor
      - lt: 0.40
        action: neutral
        signal_type: no_defensive_momentum_signal
    max_weight_multiplier: 0.45
    weight_formula: confidence_cap_multiplier
    branch_label_template: "{regime}_momentum_lite_defensive"
sources: [jegadeesh_titman_1993, time_series_momentum_2012]
