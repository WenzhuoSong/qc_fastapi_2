id: leveraged_long_amplifier_lite
type: strategy
category: leveraged_rotation
horizon: very_short_tactical
summary: Tiny risk-on amplifier signal for leveraged long ETFs.
best_regimes: [trending_bull, risk_on, sector_rotation]
weak_regimes: [high_vol, defensive, risk_off, mean_reverting, violent_whipsaw]
required_features: [mom_20d, mom_60d, mom_252d, hist_vol_20d, atr_pct, rsi_14]
positive_signals:
  - risk-on regime is active
  - leveraged ETF has positive multi-horizon momentum
  - underlying ETF trend confirms
  - ATR and overbought pressure are controlled
failure_modes:
  - daily reset compounding erodes returns in choppy regimes
  - gap risk is amplified by leverage
  - late entries after crowded rallies can reverse sharply
governance_implications:
  - treat as momentum-family evidence, not independent alpha-family evidence
  - never treat leveraged ETF output as core exposure
  - require conviction before promotion beyond watch-only
compatibility_mappings:
  - role: leveraged_long
    horizon: very_short_tactical
    score_thresholds:
      - gte: 0.70
        action: increase
        signal_type: leveraged_risk_on_amplifier
      - gte: 0.40
        action: watch
        signal_type: leveraged_amplifier_watch
      - lt: 0.40
        action: neutral
        signal_type: no_leveraged_amplifier_signal
    max_weight_multiplier: 0.35
    weight_formula: confidence_cap_multiplier
    branch_label_template: "{regime}_leveraged_long_amplifier"
sources: [leveraged_etf_policy, issuer_fact_sheet, risk_governance_policy, time_series_momentum_2012]
last_reviewed: 2026-05-25
